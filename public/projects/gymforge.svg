<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GymForge Project Cover</title>
  <desc id="desc">Dark fitness themed project cover for GymForge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1118"/>
      <stop offset="100%" stop-color="#1e2435"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a6e"/>
      <stop offset="100%" stop-color="#ff8a7a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="190" fill="#ffffff" opacity="0.03"/>
  <circle cx="180" cy="560" r="220" fill="#ffffff" opacity="0.03"/>

  <rect x="240" y="320" width="720" height="36" rx="18" fill="#2c344b"/>
  <rect x="300" y="280" width="44" height="116" rx="14" fill="url(#accent)" filter="url(#glow)"/>
  <rect x="856" y="280" width="44" height="116" rx="14" fill="url(#accent)" filter="url(#glow)"/>
  <rect x="338" y="290" width="56" height="96" rx="14" fill="#111827"/>
  <rect x="806" y="290" width="56" height="96" rx="14" fill="#111827"/>

  <text x="600" y="200" text-anchor="middle" fill="#ffece8" font-family="'Space Grotesk', Arial, sans-serif" font-size="78" font-weight="700">GYMFORGE</text>
  <text x="600" y="250" text-anchor="middle" fill="#c8a7a0" font-family="'DM Sans', Arial, sans-serif" font-size="30">Fitness Dashboard and Workout Tracker</text>

  <rect x="470" y="430" width="260" height="52" rx="26" fill="url(#accent)"/>
  <text x="600" y="464" text-anchor="middle" fill="#090b10" font-family="'DM Sans', Arial, sans-serif" font-size="24" font-weight="700">Next.js + Firebase</text>
</svg>
